<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.css">
	<link rel="stylesheet" href="node_modules/theme-switcher-compostrap/dist/theme-switcher.css">
	<link rel="stylesheet" href="dist/sidebar.css">
	<title>Sidebar</title>
</head>

<body>

<header>
	<nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
		<div class="container-fluid">

			<!-- title -->
			<a class="navbar-brand" href="#">Sidebar</a>

			<div class="ms-auto d-flex align-items-center">

				<!-- theme toggle -->
				<button class="btn btn-link nav-link theme-switcher py-2 px-0 px-lg-2 border-0 text-decoration-none" type="button" aria-label="Toggle theme" data-theme-switcher data-theme-light-label="Switch to light" data-theme-dark-label="Switch to dark">
					<span data-theme-switcher-label>Switch to dark</span>
				</button>

				<!-- sidebar toggle -->
				<button class="navbar-toggler btn btn-link border-0 ms-2" type="button" id="sidebar" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
			</div>
		</div>
	</nav>
</header>

<div class="d-flex wrapper wrapper-navbar-used wrapper-navbar-fixed">

	<nav role="navigation" class="sidebar shadow-soft" id="navigation">

		<!-- sidebar -->
		<div class="sidebar-menu">
			<div class="sidebar-menu-fixed"></div>
		</div>
	</nav>

	<div class="container-fluid">

		<!-- content -->
		<main role="main"></main>
	</div>
</div>

<script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
<script type="module">
	import { Sidebar } from "./dist/index.js";
	import ThemeSwitcher from "./node_modules/theme-switcher-compostrap/dist/index.js";

	document.addEventListener('DOMContentLoaded', () => {
		Sidebar.init();
		new ThemeSwitcher().initialize();
	});
</script>

</body>
</html>
